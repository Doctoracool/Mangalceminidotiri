<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard - Charcoal Marketplace</title>

<link rel="stylesheet" href="admin.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🔥 Admin Panel</h2>

  <button onclick="showSection('dashboard')">📊 Dashboard</button>
  <button onclick="showSection('products')">📦 Products</button>
  <button onclick="showSection('orders')">🛒 Orders</button>
  <button onclick="showSection('vendors')">🏪 Vendors</button>
  <button onclick="showSection('approvals')">✅ Approvals</button>
  <button onclick="showSection('roles')">👤 Role Manager</button>

  <button onclick="logout()" style="margin-top:20px; background:red;">
    🚪 Logout
  </button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- DASHBOARD -->
  <section id="dashboard" class="section active">
    <h1>Overview</h1>

    <div class="cards">
      <div class="card">
        <h3>Total Sales</h3>
        <p id="sales">0 Pi</p>
      </div>

      <div class="card">
        <h3>Orders</h3>
        <p id="ordersCount">0</p>
      </div>

      <div class="card">
        <h3>Vendors</h3>
        <p id="vendorsCount">0</p>
      </div>

      <div class="card">
        <h3>Products</h3>
        <p id="productsCount">0</p>
      </div>
    </div>
  </section>

  <!-- PRODUCTS -->
  <section id="products" class="section">
    <h1>Products</h1>

    <div id="adminProducts"></div>

    <h3>Add New Product</h3>
    <form id="adminProductForm">
      <input id="pname" placeholder="Product name" required>
      <input id="pprice" placeholder="Price in Pi" required>
      <input id="plocation" placeholder="Location" required>
      <input id="pstock" placeholder="Stock" required>
      <input id="pimage" type="file" required>

      <button type="submit">Upload Product</button>
    </form>
  </section>

  <!-- ORDERS -->
  <section id="orders" class="section">
    <h1>Orders</h1>
    <div id="adminOrders"></div>
  </section>

  <!-- VENDORS -->
  <section id="vendors" class="section">
    <h1>Vendors</h1>
    <div id="adminVendors"></div>
  </section>

  <!-- APPROVALS -->
  <section id="approvals" class="section">
    <h1>Approvals Dashboard</h1>

    <div class="approval-grid">

      <div class="approval-box">
        <h3>Pending Vendors</h3>
        <div id="pendingVendors" class="list-box">
          <p>No pending vendors</p>
        </div>
      </div>

      <div class="approval-box">
        <h3>Pending Products</h3>
        <div id="pendingProducts" class="list-box">
          <p>No pending products</p>
        </div>
      </div>

    </div>
  </section>

  <!-- ROLE MANAGER -->
  <section id="roles" class="section">
    <h1>Role Manager</h1>
    <div id="usersList"></div>
  </section>

</div>
  
<script src="adminApproval.js"></script>
<script src="admin.js"></script>

</body>
</html>
