<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Vendor Page - Charcoal Marketplace</title>

<link rel="stylesheet" href="vendor.css" />

<!-- Pi SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>

<div class="container">

  <h2>🏪 Vendor Panel</h2>

  <p id="msg"></p>

  <!-- LOGOUT -->
  <button onclick="logout()" style="background:red;color:white;padding:10px;">
    Logout
  </button>

  <hr />

  <!-- PRODUCT FORM -->
  <form id="productForm">

    <input id="name" type="text" placeholder="Product name" required />
    
    <input id="price_pi" type="number" placeholder="Price in Pi" required />
    
    <input id="location" type="text" placeholder="Location" required />
    
    <input id="stock" type="number" placeholder="Stock quantity" required />
    
    <input id="image" type="file" accept="image/*" required />

    <button id="submitBtn" type="submit">Add Product</button>
  </form>

  <hr />

  <h3>📦 My Products</h3>
  <div id="myProducts"></div>

</div>

<!-- CONNECT JS FILE -->
<script src="vendor.js"></script>

</body>
</html>
