<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Charcoal Marketplace</title>

<link rel="stylesheet" href="style.css">

<!-- Pi SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<!-- Pi Init (UNCHANGED) -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  if (window.Pi) {
    Pi.init({ version: "2.0" });
  }
});
</script>

</head>

<body>

<!-- ================= ADMIN MENU ================= -->
<div class="admin-menu">
  <button class="admin-btn" onclick="toggleAdminMenu()">⋮</button>

  <div id="adminDropdown" class="admin-dropdown">
    <a href="admin-login.html">Access Panel</a>
  </div>
</div>

<!-- ================= HEADER ================= -->
<header class="navbar">
  <h1>🔥 Charcoal Marketplace</h1>
    <button onclick="openCart()" class="cart-btn">
      🛒 Cart (<span id="cartCount">0</span>)
    </button>
</header>

<!-- ================= MAIN ================= -->
<main>

<!-- HERO -->
<section class="hero">
  <h2>Buy & Sell Charcoal Using Pi Coin</h2>
  <p>Fast • Secure • Transparent Marketplace</p>

  <input 
    id="searchInput"
    type="text"
    placeholder="Search charcoal products..."
    autocomplete="off"
  />
</section>

<!-- STATUS -->
<div id="status" class="status">
  Loading products...
</div>

<!-- PRODUCTS -->
<section id="products" class="grid"></section>

</main>

<!-- ================= CART MODAL ================= -->
<div id="cartModal" class="cart-modal">
  <div class="cart-box">
    <h3>Your Cart</h3>

    <div id="cartItems"></div>

    <p><b>Total:</b> <span id="cartTotal">0 Pi</span></p>

    <button onclick="goToCheckout()">Proceed to Checkout</button>
    <button onclick="closeCart()">Close</button>
  </div>
</div>

<!-- ================= BOTTOM NAV ================= -->
<nav class="bottom-nav">
  <a href="index.html">Home</a>
  <a href="vendor-login.html">Add Product</a>
</nav>

<!-- ================= APP JS ================= -->
<script src="app.js"></script>

<!-- ================= ADMIN MENU SCRIPT (UNCHANGED) ================= -->
<script>
function toggleAdminMenu() {
  const menu = document.getElementById("adminDropdown");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

document.addEventListener("click", function (e) {
  const menu = document.getElementById("adminDropdown");
  const btn = document.querySelector(".admin-btn");

  if (!menu.contains(e.target) && e.target !== btn) {
    menu.style.display = "none";
  }
});
</script>

</body>
</html>
